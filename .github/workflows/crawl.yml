name: 591 Rent Crawler

on:
  workflow_dispatch:
    inputs:
      subscriptions:
        description: 'JSON array of subscriptions'
        required: true
        type: string

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright httpx
          playwright install chromium --with-deps

      - name: Log subscription URLs
        env:
          SUBSCRIPTIONS: ${{ inputs.subscriptions }}
        run: |
          echo "=== Subscription URLs ==="
          echo "$SUBSCRIPTIONS" | python3 -c "
          import json, sys
          subs = json.loads(sys.stdin.read())
          for s in subs:
              print(f'chat_id={s[\"chat_id\"]}:')
              for u in s.get('urls', []):
                  print(f'  {u}')
          "

      - name: Run crawler
        env:
          SUBSCRIPTIONS: ${{ inputs.subscriptions }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python crawler/crawler.py
