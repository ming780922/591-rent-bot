name: Deploy Miniapp to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'miniapp/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Inject API Worker URL
        env:
          API_WORKER_URL: ${{ secrets.API_WORKER_URL }}
        run: sed -i "s|__API_WORKER_URL__|${API_WORKER_URL}|g" miniapp/app.js

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy miniapp/ --project-name=591-rent-miniapp
